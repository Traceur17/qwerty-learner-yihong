dict:
  id: wang-c11-biscuit
  name: 雅思wang C11（饼干专属）
  description: 《剑18》专用测试
  category: 国际考试
  tags: [IELTS, 饼干专属音频]
  language: en
  languageCategory: en
  accent: uk
  defaultPronIndex: 1

units:
  excel: ./source/IETS-wang.xlsx
  chapterFilter: '11'
  sheetPattern: '*'
  sheetIdRegex: '^(?<chapter>\d+)\.(?<unit>\d+)$'
  requireSheetIdMatch: true
  fixedColumns:
    startRow: 2
    seq: 1
    name: 2
    phone: 3
    trans: 4

audio:
  chapterDirPattern: ./source/audio/C11
  filePattern: '^Section\s+(?<unit>\d+)\.mp3$'
  skipMissingAudio: true
  manualDir: ./source/manual/C11

segmentation:
  strategy: anchor-boundary
  # 禁止固定时长兜底：词表多于录音时按真实词组匹配，缺音频的词标 audioMissing
  fallback: []
  allowPartial: true
  anchor:
    startPadSec: 0.2
    endPadSec: 0.3
    tailEndPadSec: 0.45
    minGapSec: 0.02
  clusterGapSec: 2.5
  whisper:
    model: Xenova/whisper-tiny.en
  silence:
    # 更敏感，尽量多检出词组（用户反馈 Section2 可听到 320+）
    noiseDb: -45
    minSilenceSec: 0.2
    # 第 2–4 章介绍约 6s；第 1 章见 unitOverrides
    minIntroSec: 6
    contentStartSec: 6
    rhythmWindowSize: 5
    rhythmIntervalMin: 3.5
    rhythmIntervalMax: 6.5
    minPhraseSec: 0.2
    maxPhraseSec: 10
    introMaxSec: 6
  unitOverrides:
    '11-01':
      silence:
        minIntroSec: 32
        contentStartSec: 32
        introMaxSec: 32
  paddingMs: 150
  trimSilence: false

validation:
  minSimilarity: 0.85
  failOnMismatch: true
  minDurationSec: 0.2
  maxDurationSec: 15
  verifyTranscript: false

output:
  audioDir: ../public/audio/wang-c11-audio
  dictDir: ../public/dicts
  reportDir: ../output/reports
  registerDictionary: true
  combinedDict: true
  combinedDictId: wang-c11-biscuit
  perUnitDict: false
  mergedAudio: false
  cleanupClipFiles: false
