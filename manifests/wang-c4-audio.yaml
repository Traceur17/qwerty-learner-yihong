dict:
  id: wang-c4-biscuit
  name: 雅思wang C4（饼干专属）
  description: 吞音连读混合训练语料库（王陆 C4 教材音频，形容词 Test 1–3 + 副词）
  category: 国际考试
  tags: [IELTS, 音频]
  language: en
  languageCategory: en
  accent: uk
  defaultPronIndex: 1

units:
  excel: ./source/IETS-wang.xlsx
  chapterFilter: '4'
  sheetPattern: '*'
  sheetIdRegex: '^(?<chapter>\d+)\.[\d.]+-(?<unit>\d+)$'
  requireSheetIdMatch: true
  includeSheets:
    - name: '4.4'
      chapter: '4'
      unit: '4'
  fixedColumns:
    startRow: 2
    seq: 1
    name: 2
    phone: 3
    trans: 4

audio:
  chapterDirPattern: ./source/audio/C4
  # C4：形容词 Test N；副词为「04 副词 Test-…」（无 Test 编号，用文件前缀 order 匹配 unit）
  filePattern: '^(?<order>\d+)\s+.+?\s+Test(?:\s+(?<unit>\d+))?-.+\.mp3$'
  skipMissingAudio: true
  manualDir: ./source/manual/C4

segmentation:
  strategy: anchor-boundary
  fallback: [calibrated-fixed, fixed]
  anchor:
    startPadSec: 0.2
    endPadSec: 0.3
    tailEndPadSec: 0.45
    minGapSec: 0.02
  clusterGapSec: 2.5
  whisper:
    model: Xenova/whisper-tiny.en
  silence:
    noiseDb: -38
    minSilenceSec: 0.45
    minIntroSec: 22
    rhythmWindowSize: 5
    rhythmIntervalMin: 3.5
    rhythmIntervalMax: 6.5
    minPhraseSec: 0.25
    maxPhraseSec: 10
    introMaxSec: 22
  unitOverrides:
    '4-01':
      silence:
        minIntroSec: 54
  fixed:
    skipIntroSec: 10
    intervalSec: 5
    phraseDurationSec: 4.5
    skipOutlierIntervals: 2
    calibrationSamples: 25
  paddingMs: 150
  trimSilence: false

validation:
  minSimilarity: 0.85
  failOnMismatch: true
  minDurationSec: 0.2
  maxDurationSec: 15
  verifyTranscript: false

output:
  audioDir: ../public/audio/wang-c4-audio
  dictDir: ../public/dicts
  reportDir: ../output/reports
  registerDictionary: true
  combinedDict: true
  combinedDictId: wang-c4-biscuit
  perUnitDict: false
  mergedAudio: false
  cleanupClipFiles: false
